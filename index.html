/* =====================================

===================================== */


const songsBox = 
document.getElementById("songs");


const audioPlayer =
document.getElementById("audioPlayer");


const player =
document.getElementById("player");


const nowPlaying =
document.getElementById("nowPlaying");


const lyricsPopup =
document.getElementById("lyricsPopup");


const lyricsText =
document.getElementById("lyricsText");



let currentIndex = 0;



let currentSong = null;






/* =====================================
   AFFICHAGE DES CARTES
===================================== */


function displaySongs(){


songsBox.innerHTML="";



medias.forEach((song,index)=>{



let card=document.createElement("div");


card.className="song-card";



card.innerHTML=`



<img 
class="song-photo"
src="${song.photo}">





<div class="song-buttons">



<button class="song-btn artist">

<i class="fa-solid fa-user"></i>

${song.artiste}

</button>





<button class="song-btn title">

</button>





<button class="song-btn play"

onclick="openYoutube(${index})">

displaySongs();

/* =====================================
   LECTEUR AUDIO
===================================== */


function playSong(index){


currentIndex=index;


currentSong=medias[index];


audioPlayer.src=currentSong.audio;


audioPlayer.load();


audioPlayer.play();



player.style.display="block";



nowPlaying.innerHTML=

"🎵 "+currentSong.artiste+
" - "+
currentSong.titre;



}





function closePlayer(){


audioPlayer.pause();


player.style.display="none";


}




function playCurrent(){


if(currentSong){


audioPlayer.play();


}



}





function nextSong(){


let next=currentIndex+1;



if(next>=medias.length){

next=0;

}



playSong(next);



}





function previousSong(){


let prev=currentIndex-1;



if(prev<0){

prev=medias.length-1;

}



playSong(prev);



}






/* =====================================
   LYRICS POPUP
===================================== */



function openLyrics(index){


let song=medias[index];


lyricsText.innerHTML=


"<h3>"+song.artiste+
" - "+
song.titre+
"</h3><br>"+

song.lyrics;



lyricsPopup.style.display="block";



}




function openCurrentLyrics(){


if(currentSong){


openLyrics(currentIndex);


}


}





function closeLyrics(){


lyricsPopup.style.display="none";


}






/* =====================================
   LIENS EXTERNES
===================================== */


function openYoutube(index){


window.open(
medias[index].youtube,
"_blank"
);


}





function openTikTok(index){


window.open(
medias[index].tiktok,
"_blank"
);


}





function openFacebook(index){


window.open(
medias[index].facebook,
"_blank"
);


}






/* =====================================
   FAVORIS
===================================== */


function addFavorite(index){


let favoris=

JSON.parse(

localStorage.getItem("elligidoFav")

||"[]"

);



if(!favoris.includes(index)){



favoris.push(index);



localStorage.setItem(

"elligidoFav",

JSON.stringify(favoris)

);



alert("⭐ Chanson ajoutée aux favoris");



}

else{


alert("Cette chanson est déjà dans les favoris");


}



}






// MENU HAMBURGER

document.addEventListener("DOMContentLoaded", function(){

const menuBtn = document.getElementById("menuBtn");

const menu = document.getElementById("menu");


if(menuBtn && menu){


menuBtn.addEventListener("click", function(){

menu.classList.toggle("active");

});


document.querySelectorAll("#menu a").forEach(function(link){


link.addEventListener("click", function(){

menu.classList.remove("active");

});


});


}


});







/* =====================================
   POPUP REMARQUE
===================================== */


const noticeBtn =

document.getElementById("noticeBtn");



const noticePopup =

document.getElementById("noticePopup");





noticeBtn.onclick=function(){


noticePopup.style.display="block";


};






function closeNotice(){


noticePopup.style.display="none";


}





/* =====================================
   FERMER POPUP EN CLIQUANT DEHORS
===================================== */


window.onclick=function(event){



if(event.target==lyricsPopup){


closeLyrics();


}



if(event.target==noticePopup){


closeNotice();


}



};
